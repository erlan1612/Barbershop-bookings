name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  frontend:
    name: Frontend (lint/test/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate OpenAPI types
        run: npm run api:types

      - name: Verify OpenAPI client is up to date
        run: git diff --exit-code src/api/generated/openapi.ts

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend (migrate/seed/smoke/integration)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/barbershop_test
      PGSSL: "false"
      JWT_SECRET: ci-jwt-secret
      ADMIN_USER: admin_user
      ADMIN_PASSWORD: admin_password
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: barbershop-booking-api/package-lock.json

      - name: Start test Postgres via Docker Compose
        run: docker compose -f docker-compose.test.yml up -d

      - name: Wait for Postgres healthcheck
        run: |
          for i in {1..30}; do
            STATUS="$(docker inspect --format='{{json .State.Health.Status}}' barbershop-postgres-test || true)"
            if [ "$STATUS" = "\"healthy\"" ]; then
              echo "Postgres is healthy"
              exit 0
            fi
            echo "Waiting for Postgres... attempt $i"
            sleep 2
          done
          echo "Postgres did not become healthy in time"
          docker compose -f docker-compose.test.yml logs postgres-test
          exit 1

      - name: Install backend dependencies
        run: npm ci --prefix barbershop-booking-api

      - name: Run backend CI test pipeline
        run: npm run test:ci --prefix barbershop-booking-api

      - name: Stop test Postgres
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
