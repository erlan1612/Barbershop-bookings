services:
  - type: web
    name: barbershop-booking-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: barbershop-postgres
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: MAX_ACTIVE_BOOKINGS_PER_USER
        value: "2"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
  - type: cron
    name: barbershop-seed-refresh
    runtime: node
    region: frankfurt
    schedule: "0 3 * * *"
    buildCommand: npm ci
    startCommand: node scripts/seed_refresh.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barbershop-postgres
          property: connectionString
      - key: PGSSL
        value: "true"
      - key: RESET_DEMO
        value: "false"

databases:
  - name: barbershop-postgres
    databaseName: barbershop
    user: barbershop
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
